<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayfa Bulunamadı - 7/24 Akü Takviyecisi Yol Yardım</title>
    <link rel="shortcut icon" href="/assets/img/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/css/style.css?v=7">
    <style>
        .error-page-wrapper {
            min-height: calc(100vh - 180px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .error-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 25px rgba(255, 71, 87, 0.05);
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--primary-glow);
        }
        .error-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .error-desc {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 35px;
        }
        .error-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .error-btn {
            text-decoration: none;
            width: 100%;
            max-width: 320px;
            padding: 15px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.05rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
        }
        .error-btn:hover {
            transform: translateY(-2px);
        }
        .btn-home {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--card-border);
        }
        .btn-home:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
 
    <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/assets/img/logo.png?v=1" alt="Akü Takviyecisi" height="100">
            </a>
        </div>
    </nav>
 
    <div class="container error-page-wrapper">
        <div class="error-card">
            <div class="error-code">404</div>
            <h1 class="error-title">Sayfa Yolunu Şaşırdı!</h1>
            <p class="error-desc">Aradığınız sayfa silinmiş veya adresi değişmiş olabilir. Ancak endişelenmeyin, siz yolda kalmadınız! Akü Takviyecisi mobil yardım araçlarımız Çanakkale genelinde 7/24 hizmetinizde.</p>
            <div class="error-actions">
                <a href="tel:+905551663380" class="error-btn btn-rep">📞 ACİL USTA ÇAĞIR</a>
                <a href="/" class="error-btn btn-home">🏠 Ana Sayfaya Dön</a>
            </div>
        </div>
    </div>

    <!-- ALT SABİT WHATSAPP/ARAMA ÇUBUĞU -->
    <div class="cta-container">
        <a href="tel:+905551663380" class="cta-btn btn-call">📞 ACİL EKİP ÇAĞIR</a>
        <a href="https://wa.me/905551663380?text=Merhaba+Ak%C3%BC+Takviyecisi%2C+yolda+kald%C4%B1m.+Yol+yard%C4%B1m+ve+fiyat+teklifi+almak+istiyorum." target="_blank" class="cta-btn btn-whatsapp" rel="noopener noreferrer">💬 WP KONUM GÖNDER</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
